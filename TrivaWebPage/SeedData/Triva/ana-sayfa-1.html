<!DOCTYPE html>
<html class="light" lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Triva | Ana Sayfa 1</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-5">
      <span class="text-xl font-bold tracking-tight text-teal-700">Triva</span>
      <nav class="hidden gap-8 text-sm font-medium text-slate-600 md:flex">
        <a href="#" class="hover:text-teal-700">Hizmetler</a>
        <a href="#" class="hover:text-teal-700">Projeler</a>
        <a href="#" class="hover:text-teal-700">İletişim</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="mx-auto grid max-w-6xl gap-10 px-6 py-16 md:grid-cols-2 md:items-center">
      <div>
        <p class="text-sm font-semibold uppercase tracking-wide text-teal-600">Ana sayfa · düzen 1</p>
        <h1 class="mt-3 text-4xl font-bold leading-tight md:text-5xl">Dijital deneyimlerinizi güçlendirin</h1>
        <p class="mt-4 text-lg text-slate-600">Yerleşim: sol metin, sağ görsel. Metin kutularını sayfa düzenle üzerinden ekleyin.</p>
      </div>
      <div class="overflow-hidden rounded-2xl border border-slate-200 shadow-lg">
        <img data-triva-img="hero" class="h-72 w-full object-cover md:h-96" src="https://images.unsplash.com/photo-1497366216548-37526070297c?w=1200&q=80" alt="Ofis" />
      </div>
    </section>
    <section class="border-t border-slate-200 bg-white py-14">
      <div class="mx-auto max-w-6xl px-6">
        <h2 class="text-2xl font-semibold">Öne çıkanlar</h2>
        <div class="mt-8 grid gap-6 sm:grid-cols-2">
          <article class="overflow-hidden rounded-xl border border-slate-200">
            <img data-triva-img="card-a" class="h-48 w-full object-cover" src="https://images.unsplash.com/photo-1522071820081-009f0129c71c?w=800&q=80" alt="Ekip" />
            <div class="p-4">
              <h3 class="font-semibold">İş birliği</h3>
              <p class="mt-1 text-sm text-slate-600">Kısa açıklama alanı.</p>
            </div>
          </article>
          <article class="overflow-hidden rounded-xl border border-slate-200">
            <img data-triva-img="card-b" class="h-48 w-full object-cover" src="https://images.unsplash.com/photo-1553877522-43269d4ea984?w=800&q=80" alt="Çalışma" />
            <div class="p-4">
              <h3 class="font-semibold">Sonuç odaklı</h3>
              <p class="mt-1 text-sm text-slate-600">Kısa açıklama alanı.</p>
            </div>
          </article>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
