<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Curator | Dark Main</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body class="bg-[#1c1b1b] text-[#f9f9f9]">
  <main class="pt-24 min-h-screen">
    <section class="px-8 pt-12 pb-20 max-w-[1920px] mx-auto">
      <h1 class="italic text-7xl md:text-8xl leading-[0.85] tracking-tight mb-8">Defining the <br /><span class="ml-10">Digital Avant-Garde.</span></h1>
      <p class="text-lg text-zinc-300 max-w-xl">An independent practice focused on high-end editorial experiences and bespoke digital systems.</p>
    </section>
    <section class="bg-black/40 py-24 px-8">
      <h2 class="italic text-5xl mb-12">Curation</h2>
      <div class="grid md:grid-cols-2 gap-8">
        <article><img class="w-full rounded-lg" src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?q=80&w=1200&auto=format&fit=crop" alt="Obsidian Studio" /><h3 class="mt-3 text-3xl italic">Obsidian Studio</h3></article>
        <article><img class="w-full rounded-lg" src="https://images.unsplash.com/photo-1456324504439-367cee3b3c32?q=80&w=1200&auto=format&fit=crop" alt="Ether Magazine" /><h3 class="mt-3 text-3xl italic">Ether Magazine</h3></article>
      </div>
    </section>
  </main>
</body>
</html>
