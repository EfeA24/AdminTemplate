<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Curator | Dark Gallery</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
</head>
<body class="bg-[#1c1b1b] text-[#f9f9f9]">
  <main class="pt-24 min-h-screen">
    <header class="px-8 mb-16 max-w-[1920px] mx-auto">
      <h1 class="text-6xl md:text-7xl italic leading-[0.9]">Cinematic <br />Perspectives</h1>
      <p class="text-lg text-zinc-300 mt-6 max-w-xl">A curated selection of visual narratives exploring light, architecture, and digital stillness.</p>
    </header>
    <section class="mb-20 px-8">
      <div class="flex overflow-x-auto gap-8 pb-8">
        <article class="flex-none w-[70vw] rounded-lg overflow-hidden"><img class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1519608487953-e999c86e7455?q=80&w=1400&auto=format&fit=crop" alt="Monoliths of the North" /></article>
        <article class="flex-none w-[70vw] rounded-lg overflow-hidden"><img class="w-full h-full object-cover" src="https://images.unsplash.com/photo-1472396961693-142e6e269027?q=80&w=1400&auto=format&fit=crop" alt="Icelandic Fragments" /></article>
      </div>
    </section>
  </main>
</body>
</html>
